name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: CLI help
        run: python scripts/reviewflow.py --help
      - name: Unit tests
        run: python -m unittest discover -s tests
